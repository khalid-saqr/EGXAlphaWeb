name: Deploy EGXResearch Public Site

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate public wire
        run: node tests/test-public-wire.mjs

      - name: Build production artifact
        run: npm run build

      - name: Verify production output
        run: node tests/test-build-output.mjs

      - name: Capture failed site artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: homepage-debug-site
          path: _site

      - name: Verify investor homepage
        run: node tests/test-homepage-layout.mjs

      - name: Verify methodology white paper
        run: node tests/test-methodology-layout.mjs

      - name: Verify Pages artifact
        run: npm run verify:pages

      - name: Verify public boundary
        run: node tests/test-no-leakage.mjs

      - name: Verify text-only repository
        run: node tests/test-no-binaries.mjs

      - name: Configure Pages
        if: github.event_name != 'pull_request'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
